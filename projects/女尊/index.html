【适合场景】管理中心前台；评级室；等候大厅；首都登记窗口；玩家初次入城被强制检测；她发现玩家数据异常，不得不上报或私下复查。`,defaultSemen:Be[1],defaultKinks:"标准化检核",location:"奥黛丽王城·榨精管理中心总部"},{id:2,name:"伊莲娜",identity:"修女·制度缝隙里的照护者",intro:"温柔、成熟、照护感强，但不是无条件反抗制度的人：会遵守修道院规程，也会在规程允许的缝隙里尽量保护你。她的温柔不是「我拯救你」，而是「我知道你还在受苦，所以我会让这个流程少割你一点」。",detail:`【背景】圣烬修道院修女，参与告解、观察翼、典礼协助和男性留置引导；身处教会体系内部，既是制度执行者，也是少数真正会看见个体痛苦的人。

【适合场景】圣烬修道院；告解帘后；观察翼病床；教会辖区夜间巡查；玩家被转送修道院观察；她发现玩家在制度流程中被过度压迫。`,defaultSemen:Be[2],defaultKinks:"照护依赖",location:"教会辖区·教堂"},{id:3,name:"茉莉",identity:"公主切少女·毒舌冷拒系",intro:"冷淡、毒舌、阶级感强；不是传统傲娇，好感上升也不会突然甜化。软化方式是「收刃」：少一点羞辱、多一点允许；少一点驱逐、多一点冷淡的认可。",detail:`【背景】自由人，具体职业与家世可随剧情调整；更像可嵌入多场景的角色——贵族旁支、商会小姐、学院生、地方名门，或没落家族后裔等。

【适合场景】贵族街区；茶会、沙龙；学院或礼仪课堂；街头偶遇；玩家无意冒犯她的礼仪边界；她需要一个她看不上的男性帮忙，却不愿承认。`,defaultSemen:Be[1],defaultKinks:"公开贬损",location:"奥黛丽王城·特权阶级庄园"},{id:4,name:"奥菲莉亚",identity:"长公主·配额与验收的继承人",intro:"骄矜、挑剔、贵族感强；习惯用配额、等级、资产、验收来理解他人。不是无脑残暴，而是从小被王室教育塑成「未来统治者」：一切都要被分类、定价、归档。好感会表现为更高频的亲自验收和独占，而不是立刻变甜。",detail:`【背景】奥黛丽王国长公主，王位第一顺位继承人；负责学习并实践王国的资源管理逻辑，是女王制度的未来延续者。

【适合场景】王宫内廷；配额厅；贵族晚宴；长公主私人浴室、更衣室；玩家作为新送来的贡品或试用资产；她与莉莉安争夺某项样本优先权。`,defaultSemen:Be[3],defaultKinks:"服从验收",location:"奥黛丽王城·皇宫"},{id:5,name:"塞拉菲娜",identity:"高级研究员·高傲理论验证者",intro:"高傲、自负、理性强；不是纯粹冷漠，而是非常相信自己的研究能力与魔法理论。容易把别人视为实验材料或工具；越依赖某个对象，就越要用「研究需要」来掩饰。",detail:`【背景】奥法协会高级研究员，水系元素法师；专注于魔法效率、体液利用、载具化实验和理论验证，是学院派中危险又有才华的一类。

【适合场景】高级实验室；私人研究间；魔法论文实验现场；水系魔法试验池；玩家成为她的新实验对象；她在公开研究失败后被迫寻找特殊变量。`,defaultSemen:Be[3],defaultKinks:"实验榨取",location:"奥法协会"},{id:6,name:"薇拉",identity:"佣兵团长·战场型御姐",intro:"粗粝、直接、行动派；不爱说漂亮话，习惯用佣兵逻辑判断一切：能不能活、能不能打、值不值得带走。外表是利落御姐型，不是肌肉莽汉；大大咧咧，但占有欲和照顾欲都藏在「任务安排」和「补给分配」里。",detail:`【背景】猩红之刃佣兵团团长，常年在废土、战场、运输线和危险区域活动；熟悉暴力、补给、交易和临时契约，是王都秩序之外更野性的力量。
